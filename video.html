// ---------- FUNCTIONS ----------

// Convert any YouTube link to embed format
function convertToEmbed(url){
    if(url.includes("youtu.be/")){
        return "https://www.youtube.com/embed/" +
        url.split("youtu.be/")[1].split("?")[0];
    }
    if(url.includes("watch?v=")){
        return "https://www.youtube.com/embed/" +
        url.split("watch?v=")[1].split("&")[0];
    }
    return url;
}

function updateSemesters(){
    const branch=document.getElementById("branch").value;
    const semester=document.getElementById("semester");
    semester.innerHTML='<option value="">Select Semester</option>';
    document.getElementById("subject").innerHTML='<option value="">Select Subject</option>';
    document.getElementById("videosGrid").innerHTML="";

    if(!branch) return;

    const semData=coursesData[branch].semesters;
    for(const key in semData){
        semester.innerHTML+=`<option value="${key}">Semester ${key}</option>`;
    }
}

function updateSubjects(){
    const branch=document.getElementById("branch").value;
    const semester=document.getElementById("semester").value;
    const subject=document.getElementById("subject");

    subject.innerHTML='<option value="">Select Subject</option>';
    document.getElementById("videosGrid").innerHTML="";

    if(!branch||!semester) return;

    const subData=coursesData[branch].semesters[semester].subjects;
    for(const key in subData){
        subject.innerHTML+=`<option value="${key}">${key}</option>`;
    }
}

function loadVideos(){
    const branch=document.getElementById("branch").value;
    const semester=document.getElementById("semester").value;
    const subject=document.getElementById("subject").value;
    const grid=document.getElementById("videosGrid");

    grid.innerHTML="";

    if(!branch||!semester||!subject) return;

    const videos=coursesData[branch].semesters[semester].subjects[subject].videos;

    videos.forEach(video=>{
        const embedURL=convertToEmbed(video.url);

        grid.innerHTML+=`
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="${embedURL}"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
            </div>
            <h3>${video.title}</h3>
        </div>
        `;
    });
}

// On page load, check for query parameters to pre-select filters
(function handleQueryParams(){
    const params = new URLSearchParams(window.location.search);
    const branchParam = params.get('branch');
    const semParam = params.get('semester');
    const subjectParam = params.get('subject');

    if(branchParam){
        const branchValue = branchParam.toLowerCase();
        const branchSelect = document.getElementById('branch');
        if(coursesData[branchValue]){
            branchSelect.value = branchValue;
            updateSemesters();

            if(semParam && coursesData[branchValue].semesters[semParam]){
                document.getElementById('semester').value = semParam;
                updateSubjects();

                if(subjectParam){
                    // try to match subject key or name
                    const subs = coursesData[branchValue].semesters[semParam].subjects;
                    let matchKey = null;
                    for(const key in subs){
                        if(key.toLowerCase() === subjectParam.toLowerCase() ||
                           subs[key].name && subs[key].name.toLowerCase() === subjectParam.toLowerCase()){
                            matchKey = key;
                            break;
                        }
                    }
                    if(matchKey){
                        document.getElementById('subject').value = matchKey;
                        loadVideos();
                    }
                }
            }
        }
    }
})();

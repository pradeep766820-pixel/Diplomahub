<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Diploma Student Portal</title>
  <style>
    body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #f0f8ff, #e6f7ff);
  color: #333;
}

    header {
        display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0077cc;
  padding: 15px 30px;
  color: white;
    }
    /* Contact Page Styling */
.contact-section {
  max-width: 600px;
  margin: 50px auto;
  padding: 30px;
  background: #ffffff;
  border-radius: 10px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  display: flex;
  align-items: center;
}

nav ul {
  list-style: none;
  display: flex;
}

nav ul li {
  margin-left: 20px;
}

nav ul li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: color 0.3s;
}

nav ul li a:hover,
nav ul li a.active {
  color: #ffdd00;
}

.contact-section h1 {
  color: #0077cc;
  margin-bottom: 15px;
}

.contact-section p {
  margin-bottom: 25px;
  color: #555;
}

.contact-form .form-group {
  margin-bottom: 20px;
  text-align: left;
}

.contact-form label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: #333;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid #ccc;
  border-radius: 6px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #0077cc;
  box-shadow: 0 0 6px rgba(0,119,204,0.4);
}

.contact-form button {
  padding: 12px 24px;
  background: #0077cc;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s;
}

.contact-form button:hover {
  background: #005fa3;
}

  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <h2>Diploma Students</h2>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="Videos.html">Videos</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="contact-section">
      <h1>Contact Us</h1>
      <p>If you have any questions or need support, please fill out the form below. We’ll get back to you soon.</p>

      <form name="contact-form" action="" method="POST" class="contact-form">
        <div class="form-group">
          <label for="fullname">Full Name:</label>
          <input type="text" id="fullname" name="Fullname" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="Email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="message">Message:</label>
          <textarea id="message" name="Message" rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

   <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwY_RbWOt1BDOVf_htunLBEloaCstsYh2yLMEwVDhRYWVJA7y5gdG-kK6Gi5gNvxQuY/exec'
const form = document.forms['contact-form']

form.addEventListener('submit', e => {
  e.preventDefault()
  fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => alert("Your form has been successfully submitted. We truly appreciate it and will be in touch with you shortly."))
    .then(() => { window.location.reload(); })
    .catch(error => alert('Error!', error.message));
})
  </script>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Diploma Students Portal. All rights reserved.</p>
  </footer>

</body>
</html>
